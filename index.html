<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神人微聊</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #0a121f;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        #loginPage {
            width: 100%;
            max-width: 380px;
            background: rgba(18, 30, 41, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2.8rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        #loginPage h1 {
            color: #ebf3fa;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        #loginPage .sub {
            color: #7a9ab8;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 1.2rem;
        }
        #loginPage input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #d0e4f5;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            outline: none;
            transition: 0.2s;
        }
        #loginPage input::placeholder {
            color: #4e6a82;
        }
        #loginPage input:focus {
            border-color: rgba(64, 212, 148, 0.4);
        }
        #loginPage button {
            width: 100%;
            padding: 0.85rem;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #40d494, #2ea87a);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.3rem;
        }
        #loginPage button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        #loginError {
            color: #ff6b6b;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 1rem;
            min-height: 2rem;
            line-height: 1.5;
        }
        .login-hint {
            color: #4e6a82;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 0.8rem;
            opacity: 0.6;
        }
        #app {
            display: none;
            width: 100%;
            max-width: 820px;
            height: 92vh;
            min-height: 600px;
        }
        .app-container {
            width: 100%;
            height: 100%;
            background: rgba(18, 30, 41, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            display: flex;
            align-items: center;
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            gap: 0.8rem;
        }
        .topbar .menu-btn {
            font-size: 1.4rem;
            background: none;
            border: none;
            color: #8aa9c9;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
        }
        .topbar .menu-btn:hover {
            color: #d0e4f5;
        }
        .topbar .title {
            color: #ebf3fa;
            font-weight: 600;
            font-size: 1.1rem;
            flex: 1;
        }
        .topbar .user-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 0.3rem 0.8rem 0.3rem 0.5rem;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .topbar .user-info .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2ea87a, #40d494);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.7rem;
            color: #fff;
        }
        .topbar .user-info .name {
            color: #d0e4f5;
        }
        .topbar .user-info .score {
            color: #ffd93d;
            font-weight: 600;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.15);
        }
        .chat-area .msg {
            max-width: 80%;
            padding: 0.5rem 0.9rem;
            border-radius: 16px;
            font-size: 0.9rem;
            word-break: break-word;
            line-height: 1.4;
        }
        .chat-area .msg.sent {
            align-self: flex-end;
            background: rgba(64, 212, 148, 0.15);
            color: #d0e4f5;
            border: 1px solid rgba(64, 212, 148, 0.15);
        }
        .chat-area .msg.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            color: #d0e4f5;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chat-area .msg .sender {
            font-size: 0.7rem;
            color: #7a9ab8;
            margin-bottom: 0.1rem;
        }
        .chat-area .msg .time {
            font-size: 0.6rem;
            color: #4e6a82;
            margin-top: 0.1rem;
            text-align: right;
        }
        .chat-area .msg .redpacket {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd93d55;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            margin-top: 0.2rem;
            font-size: 0.8rem;
            color: #ffd93d;
        }
        .input-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.1);
        }
        .input-bar input {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #d0e4f5;
            font-size: 0.9rem;
            outline: none;
        }
        .input-bar input:focus {
            border-color: rgba(64, 212, 148, 0.3);
        }
        .input-bar button {
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            border: none;
            background: rgba(64, 212, 148, 0.2);
            color: #7be0b0;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .input-bar button:hover {
            background: rgba(64, 212, 148, 0.3);
        }
        .input-bar .plus-btn {
            font-size: 1.2rem;
            padding: 0.3rem 0.7rem;
            background: rgba(255, 255, 255, 0.04);
            color: #8aa9c9;
            border-radius: 50%;
        }
        .input-bar .plus-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        #gameModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        #gameModal .game-box {
            background: #0e1a26;
            padding: 2rem;
            border-radius: 28px;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
        }
        #gameModal .game-box h2 {
            color: #ebf3fa;
            margin-bottom: 0.5rem;
        }
        #gameModal .game-box canvas {
            width: 100%;
            height: 300px;
            background: #1a2f40;
            border-radius: 16px;
            margin: 0.8rem 0;
            touch-action: none;
        }
        #gameModal .game-box .score-display {
            color: #ffd93d;
            font-size: 1.2rem;
            font-weight: 600;
        }
        #gameModal .game-box .close-btn {
            margin-top: 0.8rem;
            padding: 0.5rem 2rem;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.06);
            color: #8aa9c9;
            cursor: pointer;
        }
        #gameModal .game-box .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        @media (max-width: 500px) {
            .topbar .title {
                font-size: 0.9rem;
            }
            .topbar .user-info {
                font-size: 0.7rem;
                padding: 0.2rem 0.6rem;
            }
            .input-bar input {
                font-size: 0.8rem;
            }
            #loginPage {
                padding: 2rem 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div id="loginPage">
        <h1>🫡 神人微聊</h1>
        <div class="sub">三大神人专属 · 登录</div>
        <input type="text" id="loginUser" placeholder="请输入用户名">
        <input type="password" id="loginPass" placeholder="请输入密码">
        <button id="loginBtn">进入微聊</button>
        <div id="loginError"></div>
        <div class="login-hint">仅限 wu8fei / womanhello / zhonsiiq12</div>
    </div>

    <div id="app">
        <div class="app-container">
            <div class="topbar">
                <button class="menu-btn" onclick="toggleGame()">🎮</button>
                <span class="title">💬 神人群聊</span>
                <div class="user-info" id="userInfo">
                    <span class="avatar" id="avatarLetter">W</span>
                    <span class="name" id="userName">wu8fei</span>
                    <span class="score" id="userScore">🦶 0</span>
                    <span style="color:#7a9ab8;font-size:0.7rem;" id="userLevel">Lv.0</span>
                </div>
            </div>
            <div class="chat-area" id="chatArea"></div>
            <div class="input-bar">
                <input type="text" id="msgInput" placeholder="输入消息...">
                <button id="sendBtn">发送</button>
                <button class="plus-btn" onclick="showRedpacket()">+</button>
            </div>
        </div>
    </div>

    <div id="gameModal">
        <div class="game-box">
            <h2>🦶 收集汗脚</h2>
            <p style="color:#7a9ab8;font-size:0.8rem;">用框接住掉下来的汗脚！</p>
            <canvas id="gameCanvas" width="360" height="300"></canvas>
            <div class="score-display">🦶 得分: <span id="gameScore">0</span></div>
            <button class="close-btn" onclick="closeGame()">关闭</button>
        </div>
    </div>

    <script>
        // ====== Supabase 配置 ======
        const SUPABASE_URL = 'https://vydcupnckzcmriegcrba.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_N9zCemUdRRyLFWlDsgdn3A_1YOf5xFf';
        // ==========================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;
        let allUsers = [];

        // ===== 登录函数 =====
        async function login() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const errEl = document.getElementById('loginError');

            errEl.textContent = '';

            if (!username || !password) {
                errEl.textContent = '❌ 请输入用户名和密码';
                return;
            }

            console.log('🔍 尝试登录:', username);

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .maybeSingle();

                if (error) {
                    console.error('❌ Supabase 查询错误:', error);
                    errEl.textContent = '❌ 数据库查询失败，请查看控制台 (F12)';
                    return;
                }

                if (!data) {
                    console.warn('⚠️ 未找到用户:', username);
                    errEl.textContent = '❌ 用户名或密码错误';
                    return;
                }

                console.log('✅ 登录成功:', data.username);
                currentUser = data;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('app').style.display = 'block';

                const { data: users } = await supabase.from('users').select('*');
                allUsers = users || [];

                document.getElementById('avatarLetter').textContent = username[0].toUpperCase();
                document.getElementById('userName').textContent = username;
                updateScoreDisplay();

                loadMessages();
                subscribeMessages();

            } catch (err) {
                console.error('❌ 登录异常:', err);
                errEl.textContent = '❌ 网络异常，请检查控制台 (F12)';
            }
        }

        // 绑定登录按钮事件
        document.getElementById('loginBtn').addEventListener('click', login);

        // 绑定发送按钮事件
        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        // 绑定回车发送
        document.getElementById('msgInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 绑定回车登录
        document.getElementById('loginPass').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
        document.getElementById('loginUser').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        function updateScoreDisplay() {
            if (!currentUser) return;
            document.getElementById('userScore').textContent = `🦶 ${currentUser.score || 0}`;
            const level = Math.floor((currentUser.score || 0) / 7891);
            document.getElementById('userLevel').textContent = `Lv.${level}`;
        }

        // ===== 消息 =====
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(200);
            if (error) return console.error('加载消息失败:', error);
            renderMessages(data || []);
        }

        function renderMessages(messages) {
            const area = document.getElementById('chatArea');
            area.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.sender === currentUser.username ? 'sent' : 'received'}`;
                let content = `<div class="sender">${msg.sender}</div>${msg.content}`;
                if (msg.type === 'redpacket') {
                    content += `<div class="redpacket">🧧 红包: ${msg.score_change} 汗脚分</div>`;
                }
                content += `<div class="time">${new Date(msg.created_at).toLocaleTimeString()}</div>`;
                div.innerHTML = content;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        }

        function subscribeMessages() {
            supabase
                .channel('messages_changes')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const msg = payload.new;
                    if (!msg) return;
                    const area = document.getElementById('chatArea');
                    const div = document.createElement('div');
                    div.className = `msg ${msg.sender === currentUser.username ? 'sent' : 'received'}`;
                    let content = `<div class="sender">${msg.sender}</div>${msg.content}`;
                    if (msg.type === 'redpacket') {
                        content += `<div class="redpacket">🧧 红包: ${msg.score_change} 汗脚分</div>`;
                    }
                    content += `<div class="time">${new Date(msg.created_at).toLocaleTimeString()}</div>`;
                    div.innerHTML = content;
                    area.appendChild(div);
                    area.scrollTop = area.scrollHeight;
                })
                .subscribe();
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            input.value = '';
            const { error } = await supabase.from('messages').insert({
                sender: currentUser.username,
                receiver: null,
                content: text,
                type: 'text'
            });
            if (error) console.error('发送失败:', error);
        }

        // ===== 红包 =====
        function showRedpacket() {
            if (!currentUser) return;
            const target = prompt('发送给谁？(留空为群红包，输入用户名单独发)');
            if (target === null) return;
            const amount = parseInt(prompt('多少汗脚分？(输入数字)'));
            if (isNaN(amount) || amount <= 0 || amount > (currentUser.score || 0)) {
                alert('❌ 汗脚分不足或输入无效');
                return;
            }
            supabase.from('users').update({ score: (currentUser.score || 0) - amount }).eq('username', currentUser.username)
                .then(() => {
                    currentUser.score -= amount;
                    updateScoreDisplay();
                    const receiver = target.trim() || null;
                    supabase.from('messages').insert({
                        sender: currentUser.username,
                        receiver: receiver,
                        content: `🧧 发了 ${amount} 汗脚分红包${receiver ? ' 给 ' + receiver : ' (群红包)'}`,
                        type: 'redpacket',
                        score_change: amount
                    }).then(() => {
                        if (receiver) {
                            supabase.from('users').select('score').eq('username', receiver).then(({ data }) => {
                                if (data && data[0]) {
                                    const newScore = (data[0].score || 0) + amount;
                                    supabase.from('users').update({ score: newScore }).eq('username', receiver)
                                        .then(() => {
                                            if (receiver === currentUser.username) {
                                                currentUser.score = newScore;
                                                updateScoreDisplay();
                                            }
                                        });
                                }
                            });
                        }
                        loadMessages();
                    });
                });
        }

        // ===== 游戏 =====
        let gameRunning = false;
        let gameScore = 0;
        let gameInterval = null;
        let dropInterval = null;
        let basketX = 150;
        let items = [];
        let canvas = null;
        let ctx = null;
        let imageLoaded = false;
        let hjImage = new Image();
        hjImage.src = 'hj.jpg';

        function toggleGame() {
            const modal = document.getElementById('gameModal');
            if (modal.style.display === 'flex') {
                closeGame();
            } else {
                modal.style.display = 'flex';
                startGame();
            }
        }

        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(dropInterval);
        }

        function startGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            gameScore = 0;
            items = [];
            basketX = canvas.width / 2 - 25;
            gameRunning = true;
            document.getElementById('gameScore').textContent = '0';
            hjImage.onload = () => { imageLoaded = true; };
            hjImage.src = 'hj.jpg';
            clearInterval(dropInterval);
            dropInterval = setInterval(() => {
                if (!gameRunning) return;
                const x = Math.random() * (canvas.width - 30);
                items.push({ x, y: 0, size: 28 });
            }, 800);
            clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (!gameRunning) return;
                updateGame();
                drawGame();
            }, 30);
            canvas.onmousemove = (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                basketX = (e.clientX - rect.left) * scaleX - 25;
                basketX = Math.max(0, Math.min(canvas.width - 50, basketX));
            };
            canvas.ontouchmove = (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const touch = e.touches[0];
                basketX = (touch.clientX - rect.left) * scaleX - 25;
                basketX = Math.max(0, Math.min(canvas.width - 50, basketX));
            };
        }

        function updateGame() {
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += 3.5;
                if (item.y + item.size > 250 && item.y < 270 &&
                    item.x + item.size > basketX && item.x < basketX + 50) {
                    gameScore++;
                    document.getElementById('gameScore').textContent = gameScore;
                    items.splice(i, 1);
                    if (currentUser) {
                        const newScore = (currentUser.score || 0) + 1;
                        supabase.from('users').update({ score: newScore }).eq('username', currentUser.username).then(() => {
                            currentUser.score = newScore;
                            updateScoreDisplay();
                        });
                    }
                    continue;
                }
                if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#40d494';
            ctx.shadowColor = '#40d49455';
            ctx.shadowBlur = 10;
            ctx.fillRect(basketX, 250, 50, 20);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#2ea87a';
            ctx.fillRect(basketX + 5, 245, 40, 8);
            items.forEach(item => {
                if (imageLoaded && hjImage.complete) {
                    ctx.drawImage(hjImage, item.x, item.y, item.size, item.size);
                } else {
                    ctx.fillStyle = '#8B4513';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#8B451355';
                    ctx.beginPath();
                    ctx.ellipse(item.x + 14, item.y + 14, 14, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });
        }

        console.log('🫡 神人微聊已加载');
        console.log('📌 账号: wu8fei / womanhello / zhonsiiq12');
        console.log('📌 如果登录失败，请检查 Supabase RLS 是否关闭');
    </script>
</body>
</html>
